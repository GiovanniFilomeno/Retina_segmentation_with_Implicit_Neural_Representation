name: retina-inr
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pip

  # Core ML
  - pytorch>=2.0
  - torchvision>=0.15

  # Scientific computing
  - numpy>=1.24
  - matplotlib>=3.7

  # Image processing
  - pillow>=10.0

  # Utilities
  - tqdm>=4.65
  - pyyaml>=6.0
  - jupyter

  # pip-only packages
  - pip:
      - opencv-python>=4.8.0
      - albumentations>=1.3.0
